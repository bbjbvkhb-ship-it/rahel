workflows:
  flutter-ios:
    name: Rahel iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Fetch Flutter dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Build iOS App (unsigned)
        script: |
          flutter build ios --release --no-codesign --no-pub

          echo "--- Verifying build output ---"
          ls -la build/ios/iphoneos/
          echo "--- Info.plist check ---"
          ls build/ios/iphoneos/Runner.app/Info.plist && echo "✅ Info.plist EXISTS" || echo "❌ MISSING"
      - name: Package IPA
        script: |
          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found!"
            find build -name "*.app" -type d 2>/dev/null | head -10
            exit 1
          fi

          mkdir -p build/ios/Payload
          cp -r "$APP_PATH" build/ios/Payload/Runner.app
          cd build/ios
          zip -qr Rahel.ipa Payload
          rm -rf Payload
          ls -lh Rahel.ipa
          echo "✅ Rahel.ipa ready"
    artifacts:
      - build/ios/Rahel.ipa
