workflows:
  flutter-ios:
    name: Rahel iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Fetch Flutter dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Generate iOS files
        script: |
          flutter build ios --config-only --no-codesign --no-pub
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --verbose > pod_install.log 2>&1 || (tail -n 200 pod_install.log && exit 1)
      - name: Build iOS App (xcodebuild)
        script: |
          xcodebuild build \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true
      - name: Package IPA
        script: |
          # Find the built .app
          APP_PATH=$(find build/ios -name "Runner.app" -print | head -1)
          echo "Found app at: $APP_PATH"

          # Create IPA structure: Payload/Runner.app → zipped as .ipa
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r ../Rahel.ipa Payload
          echo "IPA created at build/ios/Rahel.ipa"
    artifacts:
      - build/ios/Rahel.ipa
      - build/ios/**/*.app
