workflows:
  flutter-ios:
    name: Rahel iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Fetch Flutter dependencies
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --verbose > pod_install.log 2>&1 || (tail -n 200 pod_install.log && exit 1)
      - name: Build iOS App
        script: |
          flutter build ios --release --no-codesign --no-pub
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
